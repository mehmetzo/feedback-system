services:
  web:
    build: .
    container_name: hastane_feedback_web
    ports:
      - "9990:80"
      - "9991:443"
    volumes:
      - ./www:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - TZ=Europe/Istanbul
    restart: unless-stopped
    networks:
      - hastane_net

  db:
    image: mysql:8.0
    container_name: hastane_feedback_db
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      TZ: Europe/Istanbul
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hastane_net

volumes:
  mysql_data:

networks:
  hastane_net:
    driver: bridge
